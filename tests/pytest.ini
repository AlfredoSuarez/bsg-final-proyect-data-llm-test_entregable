[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --color=yes
    --strict-markers
    -p no:warnings
markers =
    slow: tests que tardan más de 5 segundos
    docker: tests que requieren Docker
    sql: tests que requieren PostgreSQL local
